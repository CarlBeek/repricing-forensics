<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EIP-7904 Impact Analysis{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css?v={{ cache_bust }}">
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">EIP-7904</a>
    <div class="nav-links">
      <a href="/" {% if active == "home" %}class="active"{% endif %}>Home</a>
      <a href="/overview" {% if active == "overview" %}class="active"{% endif %}>Overview</a>
      <a href="/forensics" {% if active == "forensics" %}class="active"{% endif %}>Forensics</a>
      <a href="/affected" {% if active == "affected" %}class="active"{% endif %}>Affected Parties</a>
      <a href="/about" {% if active == "about" %}class="active"{% endif %}>About</a>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle CRT / Clean theme">CRT</button>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <hr>
    <p class="note">EIP-7904 Advanced Repricing Analysis <span style="margin:0 6px; opacity:0.3">&middot;</span> <span id="lastUpdated"></span></p>
  </footer>

  <script>
    // Theme toggle — persisted in localStorage
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'clean' ? 'crt' : 'clean';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.querySelector('.theme-toggle').textContent = next === 'crt' ? 'CRT' : 'CLEAN';
      // Re-render any existing Plotly charts with new colors
      if (window.updatePlotlyTheme) window.updatePlotlyTheme();
    }
    // Apply saved theme immediately (before render)
    (function() {
      const saved = localStorage.getItem('theme') || 'crt';
      document.documentElement.setAttribute('data-theme', saved);
      document.addEventListener('DOMContentLoaded', () => {
        document.querySelector('.theme-toggle').textContent = saved === 'crt' ? 'CRT' : 'CLEAN';
      });
    })();
  </script>
  <script src="/static/app.js?v={{ cache_bust }}"></script>
  <script>
    fetchJSON('/api/metadata').then(m => {
      document.getElementById('lastUpdated').textContent =
        'Updated ' + new Date(m.last_updated).toLocaleString();
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
