name: Run EIP-7904 Analysis

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pages: write

jobs:
  analyse:
    runs-on: [self-hosted, reth-server]
    env:
      RETH_DIR: ~/reth
      DIVERGENCE_DB_PATH: ~/reth/divergences.db
      RESEARCH_LAKE_PATH: ~/reth/research_lake
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          rm -rf .venv
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e .

      - name: Export Parquet from divergence DB
        run: |
          . .venv/bin/activate
          python scripts/export_parquet.py

      - name: Build DuckDB and normalize forensics
        run: |
          . .venv/bin/activate
          python scripts/build_duckdb.py --schedule-name 7904-prelim

      - name: Enrich contracts (Sourcify)
        run: |
          . .venv/bin/activate
          python scripts/enrich_contracts.py --limit 200 --address-source union

      - name: Build contract labels
        run: |
          . .venv/bin/activate
          python scripts/build_contract_labels.py

      - name: Materialize CSV tables
        run: |
          . .venv/bin/activate
          python scripts/materialize_reports.py

      - name: Generate figures
        run: |
          . .venv/bin/activate
          python scripts/generate_figures.py

      - name: Label status failure pairs
        run: |
          . .venv/bin/activate
          python scripts/label_status_failure_pairs.py

      - name: Build status call frames
        run: |
          . .venv/bin/activate
          python scripts/build_status_call_frames.py --schedule-name 7904-prelim

      - name: Build outreach report
        run: |
          . .venv/bin/activate
          python scripts/build_outreach_report.py

      - name: Build project reports
        run: |
          . .venv/bin/activate
          python scripts/build_project_reports.py

      - name: Build call graph analysis
        run: |
          . .venv/bin/activate
          python scripts/build_call_graph_analysis.py

      - name: Build HTML reports
        run: |
          . .venv/bin/activate
          python scripts/build_html_reports.py

      - name: Build briefing
        run: |
          . .venv/bin/activate
          python scripts/build_briefing.py

      - name: Upload artifacts (90-day snapshot)
        uses: actions/upload-artifact@v4
        with:
          name: eip7904-reports-${{ github.run_number }}
          path: artifacts/
          retention-days: 90

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Build a minimal pages site from the reports
          mkdir -p _site
          cp -r artifacts/reports/* _site/ 2>/dev/null || true
          cp -r artifacts/figures/* _site/ 2>/dev/null || true

          # Generate an index page
          cat > _site/index.html <<'INDEXEOF'
          <!DOCTYPE html>
          <html><head><title>EIP-7904 Analysis</title>
          <style>
            body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2em auto; padding: 0 1em; }
            a { display: block; margin: 0.5em 0; }
            .meta { color: #666; font-size: 0.9em; }
          </style></head>
          <body>
          <h1>EIP-7904 Repricing Analysis</h1>
          <div class="meta" id="timestamp"></div>
          <h2>Reports</h2>
          <div id="links"></div>
          <script>
            document.getElementById('timestamp').textContent = 'Last updated: ' + new Date().toISOString();
            // List all .html files except index
            fetch('.').then(r => r.text()).then(html => {
              const links = [...html.matchAll(/href="([^"]+\.html)"/g)]
                .map(m => m[1])
                .filter(f => f !== 'index.html');
              const container = document.getElementById('links');
              links.forEach(f => {
                const a = document.createElement('a');
                a.href = f;
                a.textContent = f.replace('.html', '').replace(/_/g, ' ');
                container.appendChild(a);
              });
            });
          </script>
          </body></html>
          INDEXEOF

          # Force-push to gh-pages (only latest, keeps repo small)
          git checkout --orphan gh-pages-tmp
          git rm -rf . > /dev/null 2>&1 || true
          cp -r _site/* .
          git add -A
          git commit -m "Update reports $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages-tmp:gh-pages --force
          git checkout -f -
