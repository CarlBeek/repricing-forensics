name: Run EIP-7904 Analysis

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  analyse:
    runs-on: [self-hosted, reth-server]
    env:
      RETH_DIR: ~/reth
      DIVERGENCE_DB_PATH: ~/reth/divergences.db
      RESEARCH_LAKE_PATH: ~/reth/research_lake
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore persistent cache
        run: |
          # Keep cache/duckdb dirs outside the checkout so they survive across runs
          mkdir -p ~/.repricing-forensics-cache/cache
          mkdir -p ~/.repricing-forensics-cache/duckdb
          ln -sfn ~/.repricing-forensics-cache/cache cache
          ln -sfn ~/.repricing-forensics-cache/duckdb duckdb

      - name: Set up Python venv
        run: |
          rm -rf .venv
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e .

      - name: Export Parquet from divergence DB
        run: |
          . .venv/bin/activate
          python scripts/export_parquet.py --max-age 3600

      - name: Build DuckDB and normalize forensics
        run: |
          . .venv/bin/activate
          python scripts/build_duckdb.py --schedule-name 7904-prelim --include-call-frames

      - name: Enrich contracts (Sourcify)
        run: |
          . .venv/bin/activate
          python scripts/enrich_contracts.py --limit 200 --address-source union

      - name: Build contract labels
        run: |
          . .venv/bin/activate
          python scripts/build_contract_labels.py

      - name: Build status call frames
        run: |
          . .venv/bin/activate
          python scripts/build_status_call_frames.py --schedule-name 7904-prelim

      - name: Materialize CSV tables
        run: |
          . .venv/bin/activate
          python scripts/materialize_reports.py

      - name: Label status failure pairs
        run: |
          . .venv/bin/activate
          python scripts/label_status_failure_pairs.py

      - name: Build project reports
        run: |
          . .venv/bin/activate
          python scripts/build_project_reports.py

      - name: Build call graph analysis
        run: |
          . .venv/bin/activate
          python scripts/build_call_graph_analysis.py

      - name: Restart web server
        run: |
          sudo systemctl restart eip7904-web || echo "Web server service not configured yet — skipping restart"
